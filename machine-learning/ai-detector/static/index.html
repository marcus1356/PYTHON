<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Detector — Sandbox</title>
  <style>
    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #22263a;
      --border: #2e3347;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --human: #22c55e;
      --uncertain: #f59e0b;
      --ai: #ef4444;
      --text: #e2e8f0;
      --muted: #64748b;
      --radius: 10px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; font-size: 14px; min-height: 100vh; }

    /* ── Layout ── */
    .top-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
    .top-bar h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.3px; }
    .top-bar h1 span { color: var(--accent); }
    .top-links { display: flex; gap: 12px; }
    .top-links a { color: var(--muted); text-decoration: none; font-size: 13px; padding: 5px 10px; border: 1px solid var(--border); border-radius: 6px; transition: color .15s, border-color .15s; }
    .top-links a:hover { color: var(--accent-hover); border-color: var(--accent); }

    .layout { display: grid; grid-template-columns: 420px 1fr; gap: 0; height: calc(100vh - 53px); }
    .panel { overflow-y: auto; padding: 20px; border-right: 1px solid var(--border); }
    .panel-right { overflow-y: auto; padding: 20px; }

    /* ── Cards ── */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; margin-bottom: 16px; }
    .card-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: .8px; color: var(--muted); margin-bottom: 14px; }

    /* ── Form controls ── */
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 5px; margin-top: 12px; }
    label:first-of-type { margin-top: 0; }
    input[type=text], textarea, select {
      width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 7px;
      color: var(--text); padding: 9px 11px; font-size: 13px; outline: none; transition: border-color .15s;
      font-family: inherit;
    }
    input[type=text]:focus, textarea:focus, select:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 140px; }

    .btn { display: inline-flex; align-items: center; gap: 7px; padding: 9px 16px; border-radius: 7px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: opacity .15s, transform .1s; }
    .btn:active { transform: scale(.97); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hover); }
    .btn-success { background: #16a34a; color: #fff; }
    .btn-success:hover:not(:disabled) { background: #15803d; }
    .btn-danger { background: #991b1b; color: #fff; }
    .btn-danger:hover:not(:disabled) { background: #7f1d1d; }
    .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-ghost:hover:not(:disabled) { border-color: var(--accent); color: var(--accent-hover); }
    .btn-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }

    /* ── Badges ── */
    .badge { display: inline-block; padding: 2px 9px; border-radius: 999px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
    .badge-human    { background: #14532d; color: var(--human); }
    .badge-uncertain{ background: #78350f; color: var(--uncertain); }
    .badge-ai       { background: #7f1d1d; color: var(--ai); }
    .badge-pending  { background: #1e3a5f; color: #60a5fa; }
    .badge-analyzing{ background: #3b2f6f; color: #a78bfa; }
    .badge-completed{ background: #14532d; color: var(--human); }
    .badge-failed   { background: #7f1d1d; color: var(--ai); }

    /* ── Probability gauge ── */
    .gauge-wrap { margin: 16px 0 8px; }
    .gauge-label { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 12px; color: var(--muted); }
    .gauge-track { height: 10px; background: var(--surface2); border-radius: 999px; overflow: hidden; border: 1px solid var(--border); }
    .gauge-fill { height: 100%; border-radius: 999px; transition: width .6s cubic-bezier(.4,0,.2,1); }

    /* ── Result card ── */
    .result-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 14px; }
    .result-item { background: var(--surface2); border-radius: 7px; padding: 10px 13px; }
    .result-item .ri-label { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
    .result-item .ri-value { font-size: 15px; font-weight: 700; }

    /* ── Submissions table ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 9px 12px; color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .6px; border-bottom: 1px solid var(--border); white-space: nowrap; }
    td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface2); }
    .td-actions { display: flex; gap: 6px; }
    td .btn { padding: 5px 10px; font-size: 12px; }

    /* ── Pagination ── */
    .pagination { display: flex; align-items: center; gap: 8px; margin-top: 14px; justify-content: flex-end; }
    .pagination span { font-size: 12px; color: var(--muted); }

    /* ── Filter row ── */
    .filter-row { display: flex; gap: 10px; margin-bottom: 14px; align-items: flex-end; flex-wrap: wrap; }
    .filter-row label { margin-top: 0; }
    .filter-row .field { display: flex; flex-direction: column; gap: 4px; }
    .filter-row select, .filter-row input { width: auto; min-width: 140px; }

    /* ── Toast ── */
    #toast-container { position: fixed; bottom: 24px; right: 24px; display: flex; flex-direction: column; gap: 8px; z-index: 999; }
    .toast { padding: 10px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; animation: slideIn .2s ease; max-width: 340px; }
    .toast-success { background: #14532d; color: var(--human); border: 1px solid #166534; }
    .toast-error   { background: #7f1d1d; color: var(--ai);    border: 1px solid #991b1b; }
    .toast-info    { background: #1e3a5f; color: #93c5fd;      border: 1px solid #1d4ed8; }
    @keyframes slideIn { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: none; } }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }

    /* ── Spinner ── */
    .spinner { width: 14px; height: 14px; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<div class="top-bar">
  <h1>AI <span>Detector</span> — Sandbox</h1>
  <div class="top-links">
    <a href="/docs" target="_blank">📄 Swagger UI</a>
    <a href="/redoc" target="_blank">📘 ReDoc</a>
    <a href="/health" target="_blank">💚 Health</a>
  </div>
</div>

<div class="layout">
  <!-- ── LEFT PANEL ── -->
  <div class="panel">

    <!-- Submit -->
    <div class="card">
      <div class="card-title">1 · Enviar Texto</div>
      <label>Texto <span style="color:var(--muted)">(50–50.000 chars)</span></label>
      <textarea id="in-text" placeholder="Cole aqui o texto que deseja analisar..."></textarea>
      <label>Título <span style="color:var(--muted)">(opcional)</span></label>
      <input type="text" id="in-title" placeholder="ex: Redação do aluno #42" />
      <label>Fonte <span style="color:var(--muted)">(opcional)</span></label>
      <input type="text" id="in-source" placeholder="ex: student-essay, blog-post" />
      <div class="btn-row">
        <button class="btn btn-primary" onclick="submitText()">
          <span>Enviar</span>
        </button>
        <button class="btn btn-ghost" onclick="clearForm()">Limpar</button>
      </div>
    </div>

    <!-- Analyze -->
    <div class="card">
      <div class="card-title">2 · Analisar</div>
      <label>ID da Submission</label>
      <input type="text" id="in-analyze-id" placeholder="Cole o ID aqui ou selecione na lista →" />
      <div class="btn-row">
        <button class="btn btn-success" onclick="analyzeSubmission()">
          <span>Analisar</span>
        </button>
        <button class="btn btn-ghost" onclick="getResult()">
          <span>Ver Resultado</span>
        </button>
      </div>
    </div>

    <!-- Result display -->
    <div class="card" id="result-card" style="display:none">
      <div class="card-title">Resultado da Análise</div>
      <div id="result-content"></div>
    </div>

    <!-- Update -->
    <div class="card">
      <div class="card-title">3 · Editar Submission</div>
      <label>ID da Submission</label>
      <input type="text" id="in-update-id" placeholder="ID da submission" />
      <label>Novo Título</label>
      <input type="text" id="in-update-title" placeholder="Novo título (opcional)" />
      <label>Nova Fonte</label>
      <input type="text" id="in-update-source" placeholder="Nova fonte (opcional)" />
      <div class="btn-row">
        <button class="btn btn-ghost" onclick="updateSubmission()">Salvar</button>
        <button class="btn btn-danger" onclick="deleteSubmission()">Excluir</button>
      </div>
    </div>

  </div>

  <!-- ── RIGHT PANEL ── -->
  <div class="panel-right">
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
        <div class="card-title" style="margin-bottom:0">Submissions</div>
        <button class="btn btn-ghost" onclick="loadSubmissions()" style="padding:5px 10px; font-size:12px;">↻ Atualizar</button>
      </div>

      <div class="filter-row">
        <div class="field">
          <label>Status</label>
          <select id="filter-status" onchange="loadSubmissions()">
            <option value="">Todos</option>
            <option value="pending">pending</option>
            <option value="analyzing">analyzing</option>
            <option value="completed">completed</option>
            <option value="failed">failed</option>
          </select>
        </div>
        <div class="field">
          <label>Fonte</label>
          <input type="text" id="filter-source" placeholder="ex: blog-post" onkeydown="if(event.key==='Enter') loadSubmissions()" />
        </div>
        <button class="btn btn-ghost" onclick="loadSubmissions()" style="padding:6px 12px; font-size:12px; margin-top:auto;">Filtrar</button>
      </div>

      <div class="table-wrap">
        <table id="submissions-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Título / Fonte</th>
              <th>Palavras</th>
              <th>Status</th>
              <th>Criado em</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="submissions-body">
            <tr><td colspan="6" class="empty">Carregando...</td></tr>
          </tbody>
        </table>
      </div>

      <div class="pagination">
        <button class="btn btn-ghost" id="btn-prev" onclick="changePage(-1)" style="padding:5px 10px; font-size:12px;">← Anterior</button>
        <span id="page-info">Página 1</span>
        <button class="btn btn-ghost" id="btn-next" onclick="changePage(1)" style="padding:5px 10px; font-size:12px;">Próxima →</button>
      </div>

    </div>
  </div>
</div>

<div id="toast-container"></div>

<script>
const BASE = '/api/v1';
let currentPage = 1;
const pageSize = 15;

// ── Toast ──────────────────────────────────────────────
function toast(msg, type = 'info') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ── API helpers ────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body !== undefined) opts.body = JSON.stringify(body);
  const res = await fetch(BASE + path, opts);
  const text = await res.text();
  let data;
  try { data = JSON.parse(text); } catch { data = text; }
  return { ok: res.ok, status: res.status, data };
}

// ── Submit text ────────────────────────────────────────
async function submitText() {
  const text = document.getElementById('in-text').value.trim();
  if (!text) { toast('Digite o texto antes de enviar.', 'error'); return; }
  if (text.length < 50) { toast('Texto muito curto (mínimo 50 caracteres).', 'error'); return; }

  const payload = { text_content: text };
  const title = document.getElementById('in-title').value.trim();
  const source = document.getElementById('in-source').value.trim();
  if (title) payload.title = title;
  if (source) payload.source = source;

  const { ok, data } = await api('POST', '/submissions', payload);
  if (ok) {
    toast(`Submission criada: ${data.id.slice(0,8)}…`, 'success');
    document.getElementById('in-analyze-id').value = data.id;
    document.getElementById('in-update-id').value = data.id;
    loadSubmissions();
  } else {
    toast(`Erro: ${JSON.stringify(data?.detail || data)}`, 'error');
  }
}

function clearForm() {
  ['in-text','in-title','in-source'].forEach(id => document.getElementById(id).value = '');
}

// ── Analyze ────────────────────────────────────────────
async function analyzeSubmission(id) {
  const sid = id || document.getElementById('in-analyze-id').value.trim();
  if (!sid) { toast('Informe o ID da submission.', 'error'); return; }

  toast('Analisando…', 'info');
  const { ok, data } = await api('POST', `/submissions/${sid}/analyze`);
  if (ok) {
    toast('Análise concluída!', 'success');
    loadSubmissions();
    await showResult(sid);
  } else {
    const detail = data?.detail || JSON.stringify(data);
    // Already analyzed? try force
    if (detail.includes('already analyzed')) {
      toast('Já analisado — buscando resultado.', 'info');
      await showResult(sid);
    } else {
      toast(`Erro: ${detail}`, 'error');
    }
  }
}

async function getResult(id) {
  const sid = id || document.getElementById('in-analyze-id').value.trim();
  if (!sid) { toast('Informe o ID da submission.', 'error'); return; }
  await showResult(sid);
}

async function showResult(sid) {
  const { ok, data } = await api('GET', `/submissions/${sid}/result`);
  const card = document.getElementById('result-card');
  const content = document.getElementById('result-content');
  card.style.display = 'block';

  if (!ok) {
    content.innerHTML = `<p style="color:var(--muted); font-size:13px;">${data?.detail || 'Ainda sem resultado — execute a análise primeiro.'}</p>`;
    return;
  }

  const score = data.ai_probability_score;
  const pct = Math.round(score * 100);
  const fillColor = score < 0.35 ? 'var(--human)' : score < 0.65 ? 'var(--uncertain)' : 'var(--ai)';

  content.innerHTML = `
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:8px;">
      <span class="badge badge-${data.verdict}">${data.verdict.toUpperCase()}</span>
      <span style="font-size:12px; color:var(--muted)">confiança: <strong style="color:var(--text)">${data.confidence_level}</strong></span>
    </div>
    <div class="gauge-wrap">
      <div class="gauge-label"><span>🟢 Humano</span><span>${pct}% IA</span><span>🔴 IA</span></div>
      <div class="gauge-track"><div class="gauge-fill" style="width:${pct}%; background:${fillColor}"></div></div>
    </div>
    <div class="result-grid">
      <div class="result-item"><div class="ri-label">Tamanho médio de frase</div><div class="ri-value">${fmt(data.features?.avg_sentence_length)} palavras</div></div>
      <div class="result-item"><div class="ri-label">Riqueza vocabular</div><div class="ri-value">${fmtPct(data.features?.vocabulary_richness)}</div></div>
      <div class="result-item"><div class="ri-label">Burstiness</div><div class="ri-value">${fmt(data.features?.burstiness_score)}</div></div>
      <div class="result-item"><div class="ri-label">Densidade de pontuação</div><div class="ri-value">${fmtPct(data.features?.punctuation_density)}</div></div>
      <div class="result-item"><div class="ri-label">Tamanho médio de palavra</div><div class="ri-value">${fmt(data.features?.avg_word_length)} chars</div></div>
      <div class="result-item"><div class="ri-label">Modelo / Tempo</div><div class="ri-value" style="font-size:12px">${data.model_version} · ${data.processing_time_ms ?? '—'}ms</div></div>
    </div>
  `;
}

function fmt(v) { return v != null ? parseFloat(v).toFixed(2) : '—'; }
function fmtPct(v) { return v != null ? (parseFloat(v) * 100).toFixed(1) + '%' : '—'; }

// ── Update ─────────────────────────────────────────────
async function updateSubmission() {
  const sid = document.getElementById('in-update-id').value.trim();
  if (!sid) { toast('Informe o ID.', 'error'); return; }
  const payload = {};
  const t = document.getElementById('in-update-title').value.trim();
  const s = document.getElementById('in-update-source').value.trim();
  if (t) payload.title = t;
  if (s) payload.source = s;
  if (!Object.keys(payload).length) { toast('Informe título ou fonte para atualizar.', 'error'); return; }

  const { ok, data } = await api('PUT', `/submissions/${sid}`, payload);
  if (ok) { toast('Atualizado com sucesso!', 'success'); loadSubmissions(); }
  else toast(`Erro: ${data?.detail || JSON.stringify(data)}`, 'error');
}

async function deleteSubmission(id) {
  const sid = id || document.getElementById('in-update-id').value.trim();
  if (!sid) { toast('Informe o ID.', 'error'); return; }
  if (!confirm(`Excluir submission ${sid.slice(0,8)}…?`)) return;

  const { ok, status, data } = await api('DELETE', `/submissions/${sid}`);
  if (ok || status === 204) { toast('Excluído.', 'success'); loadSubmissions(); }
  else toast(`Erro: ${data?.detail || JSON.stringify(data)}`, 'error');
}

// ── List ───────────────────────────────────────────────
async function loadSubmissions() {
  const status = document.getElementById('filter-status').value;
  const source = document.getElementById('filter-source').value.trim();
  let qs = `?page=${currentPage}&page_size=${pageSize}`;
  if (status) qs += `&status=${encodeURIComponent(status)}`;
  if (source) qs += `&source=${encodeURIComponent(source)}`;

  const { ok, data } = await api('GET', `/submissions${qs}`);
  const tbody = document.getElementById('submissions-body');

  if (!ok) {
    tbody.innerHTML = `<tr><td colspan="6" class="empty">Erro ao carregar.</td></tr>`;
    return;
  }

  if (!data.items.length) {
    tbody.innerHTML = `<tr><td colspan="6" class="empty">Nenhuma submission encontrada.</td></tr>`;
    updatePagination(data);
    return;
  }

  tbody.innerHTML = data.items.map(s => `
    <tr>
      <td style="font-family:monospace; font-size:11px; color:var(--muted); cursor:pointer" onclick="selectSubmission('${s.id}')" title="${s.id}">${s.id.slice(0,8)}…</td>
      <td>
        <div style="font-weight:600; font-size:13px">${esc(s.title || '—')}</div>
        ${s.source ? `<div style="font-size:11px; color:var(--muted)">${esc(s.source)}</div>` : ''}
      </td>
      <td style="color:var(--muted)">${s.word_count}</td>
      <td><span class="badge badge-${s.status}">${s.status}</span></td>
      <td style="color:var(--muted); font-size:12px">${new Date(s.created_at).toLocaleString('pt-BR')}</td>
      <td>
        <div class="td-actions">
          <button class="btn btn-success" onclick="analyzeSubmission('${s.id}')">▶ Analisar</button>
          <button class="btn btn-ghost"   onclick="getResult('${s.id}')">Resultado</button>
          <button class="btn btn-danger"  onclick="deleteSubmission('${s.id}')">✕</button>
        </div>
      </td>
    </tr>
  `).join('');

  updatePagination(data);
}

function updatePagination(data) {
  document.getElementById('page-info').textContent = `Página ${data.page} de ${data.pages || 1} (${data.total} total)`;
  document.getElementById('btn-prev').disabled = data.page <= 1;
  document.getElementById('btn-next').disabled = data.page >= (data.pages || 1);
}

function changePage(delta) {
  currentPage = Math.max(1, currentPage + delta);
  loadSubmissions();
}

function selectSubmission(id) {
  document.getElementById('in-analyze-id').value = id;
  document.getElementById('in-update-id').value = id;
  toast(`ID copiado para os campos: ${id.slice(0,8)}…`, 'info');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Boot ───────────────────────────────────────────────
loadSubmissions();
</script>
</body>
</html>
